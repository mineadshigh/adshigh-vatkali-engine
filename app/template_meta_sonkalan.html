<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">

    <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

    <div class="headline">
      <div>SON</div>
      <div>KALANLAR</div>
    </div>

    <div class="sub-title">Tükenmeden yakala</div>

    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" alt="" />
    </div>

    <div class="campaign">
      <div class="discount-big">%60’A</div>
      <div class="discount-text">VARAN İNDİRİM</div>

      <div class="basket-row">
        <span>SEPETTE</span>
        <strong>%10</strong>
      </div>
    </div>

    <div class="product-info">
      <div class="product-title">{{title}}</div>

      <div class="price-row">
        <span class="old {{old_hidden}}">{{price}}</span>
      </div>

      <div class="new-price {{new_hidden}}">{{sale_price}}</div>
      <div class="new-price {{single_hidden}}">{{price}}</div>
    </div>

  </div>
</body>
</html>
