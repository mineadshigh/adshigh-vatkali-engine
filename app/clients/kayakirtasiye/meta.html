<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">
    <div class="inner-border"></div>

    <div class="logo-area">
      <img class="logo" src="{{logo_url}}" />
    </div>

    <div class="product-area">
      <img class="product-image" src="{{product_image_primary}}" />
    </div>

    <div class="bottom-area">
      <div class="title-area">
        <div class="product-title">{{title}}</div>
      </div>

      <div class="divider"></div>

      <div class="promo-area">
        <div class="shipping-title">KARGO BEDAVA</div>
        <div class="shipping-subtitle">750 TL ve üzeri alışverişlerde</div>
        <div class="cta-button">HEMEN İNCELE</div>
      </div>
    </div>
  </div>
</body>
</html>
