<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">

    <!-- LOGO -->
    <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

    <!-- SOL BLOK -->
    <div class="left">

      <div class="main-title">
        Anneler Gününe Özel
      </div>

      <div class="offer">
        Sepette %20 İndirim
      </div>

      <div class="product-info">
        <div class="product-title">{{title}}</div>

        <div class="price-row">
          <span class="old {{old_hidden}}">{{price}}</span>
          <span class="new {{new_hidden}}">{{sale_price}}</span>
          <span class="single {{single_hidden}}">{{price}}</span>
        </div>
      </div>

    </div>

    <!-- GÖRSEL -->
    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" alt="" />
    </div>

  </div>
</body>
</html>
