<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>{{CSS}}</style>
</head>
<body>
  <div class="frame">

    <img class="logo" src="{{logo_url}}" />

    <div class="headline">
      <div class="hero-title">SON KALANLAR</div>
      <div class="subtitle">Tükenmeden yakala</div>
    </div>

    <div class="offer-vertical">
      <div class="discount-main">%60</div>
      <div class="discount-small">’a varan</div>
      <div class="discount-text">İNDİRİMLERE EK SEPETTE %10 İNDİRİM</div>
    </div>

    <div class="image-bg"></div>

    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" />
    </div>

    <div class="product-info">
      <div class="product-title">{{title}}</div>

      <div class="price-row">
        <div class="old {{old_hidden}}">{{price}}</div>
        <div class="new-price {{new_hidden}}">{{sale_price}}</div>
        <div class="new-price {{single_hidden}}">{{price}}</div>
      </div>
    </div>

  </div>
</body>
</html>
