<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">

    <div class="offer">
      <div class="offer-left">
        <div class="percent">%70</div>
        <div class="evaran">'e varan</div>
        <div class="line1">İNDİRİMLERE<br>EK</div>
      </div>

      <div class="offer-right">
        <div class="badge">SEPETTE %10 İNDİRİM</div>
        <div class="note">*seçili ürünlerde geçerlidir.</div>
      </div>
    </div>

    <div class="main-image-wrap">
      <img class="main-image" src="{{product_image_primary}}" alt="" />
    </div>

    <div class="bottom-row">
      <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

      <div class="meta">
        <div class="title">{{title}}</div>

        <div class="prices">
          <span class="old {{old_hidden}}">{{price}}</span>
          <span class="new {{new_hidden}}">{{sale_price}}</span>
          <span class="single {{single_hidden}}">{{price}}</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
