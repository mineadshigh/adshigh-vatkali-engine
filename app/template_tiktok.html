<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>{{CSS}}</style>
</head>

<body>
  <div class="frame">

    <div class="headline">SUMMER SALE</div>

    <div class="product-area">
      <img class="product-image" src="{{product_image_primary}}" alt="" />
    </div>

    <div class="product-info">
      <div class="product-title">{{title}}</div>

      <div class="price-block">
        <div class="old-price {{old_hidden}}">{{price}}</div>
        <div class="new-price {{new_hidden}}">{{sale_price}}</div>
        <div class="single-price {{single_hidden}}">{{sale_price}}</div>
      </div>
    </div>

    <div class="discount-badge">NET %20 İNDİRİM</div>

  </div>
</body>
</html>
