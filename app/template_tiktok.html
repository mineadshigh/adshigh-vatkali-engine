<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>{{CSS}}</style>
</head>
<body>
  <div class="frame">

    <img class="logo" src="{{logo_url}}" />

    <div class="top-content">
      <div class="badge">ANNELER GÜNÜ SEÇKİSİ</div>
      <div class="discount-text">
        Sepette ekstra <strong>%10 indirim</strong>
      </div>
    </div>

    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" />
    </div>

    <div class="product-info">
      <div class="product-title">{{title}}</div>

      <div class="price-row">
        <div class="old {{old_hidden}}">{{price}}</div>
        <div class="new {{new_hidden}}">{{sale_price}}</div>
        <div class="single {{single_hidden}}">{{price}}</div>
      </div>
    </div>

    <div class="campaign-note">Kampanya 11.03.2026 10:00’a kadar geçerlidir.</div>

  </div>
</body>
</html>
