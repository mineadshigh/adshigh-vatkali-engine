<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">

    <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

    <div class="main-offer">
      <div class="offer-top">
        <div class="net-text">NET</div>
        <div class="offer-main">
          <div class="discount">%40</div>
          <div class="extra-text">İNDİRİME EK</div>
        </div>
      </div>
    </div>

    <div class="product-info">
      <div class="product-title">{{title}}</div>

      <div class="price-block">
        <span class="old-price {{old_hidden}}">{{price}}</span>
        <span class="new-price {{new_hidden}}">{{sale_price}}</span>
        <span class="single-price {{single_hidden}}">{{sale_price}}</span>
      </div>
    </div>

    <div class="basket-offer">
      <span>SEPETTE</span>
      <strong>%20 İNDİRİM</strong>
    </div>

    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" alt="" />
    </div>

    <div class="legal-note">
      *Aksesuar koleksiyonu hariç tüm ürünlerde geçerlidir.
    </div>

    <div class="bayram-badge-bottom">BAYRAMA ÖZEL</div>

  </div>
</body>
</html>
