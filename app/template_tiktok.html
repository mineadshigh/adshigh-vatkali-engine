<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">

    <div class="top-title">SEZON SONU FIRSATLARI</div>

    <div class="main-image-wrap">
      <img class="main-image" src="{{product_image_primary}}" alt="" />
    </div>

    <div class="offer">
      <div class="offer-top">TÜM ÜRÜNLERDE</div>
      <div class="offer-badge">NET %40-%50-%60</div>
      <div class="offer-bottom">İNDİRİM FIRSATI</div>
    </div>

    <div class="meta">
      <div class="title">{{title}}</div>
      <div class="prices">
        <span class="old {{old_hidden}}">{{price}}</span>
        <span class="new {{new_hidden}}">{{sale_price}}</span>
        <span class="single {{single_hidden}}">{{price}}</span>
      </div>
    </div>

    <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

  </div>
</body>
</html>
