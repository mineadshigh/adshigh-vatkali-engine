<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>{{CSS}}</style>
</head>
<body>
  <div class="frame">
    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" />
    </div>

    <img class="logo" src="{{logo_url}}" />

    <div class="badge">ÇOK SATANLAR</div>

    <div class="desc desc-1">
      Sezonun en trend parçaları<br />
      avantajlı fiyatlarla seni bekliyor.
    </div>

    <div class="desc desc-2">
      Tüm indirimlere ek sepette net<br />
      <strong>%10 İNDİRİM</strong>
    </div>

    <div class="product-info">
      <div class="product-title">{{title}}</div>

      <div class="price-row">
        <span class="old {{old_hidden}}">{{price}}</span>
      </div>

      <div class="new-price {{new_hidden}}">{{sale_price}}</div>
      <div class="new-price {{single_hidden}}">{{price}}</div>
    </div>
  </div>
</body>
</html>
