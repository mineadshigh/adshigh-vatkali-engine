<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=1080, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>{{CSS}}</style>
</head>
<body>
  <div class="frame">

    <div class="brandLogo">
      <img class="logoImg" src="{{logo_url}}" loading="eager" />
    </div>

    <div class="subtitle">SEZON İNDİRİMLERİNİ KEŞFET!</div>

    <div class="imgFrame">
      <img class="productImg" src="{{product_image_primary}}" loading="eager" />
    </div>

    <div class="bottomCenter">
      <div class="productTitle">{{title}}</div>

      <div class="priceRow">
        <div class="oldPrice {{old_hidden}}">{{price}}</div>
        <div class="newPrice {{new_hidden}}">{{sale_price}}</div>
        <div class="singlePrice {{single_hidden}}">{{price}}</div>
      </div>
    </div>

  </div>
</body>
</html>
