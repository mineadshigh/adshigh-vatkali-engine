<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>{{CSS}}</style>
</head>

<body>
  <div class="frame">

    <div class="top-bar">
      <div class="logo"></div>
    </div>

    <div class="images-row">
      <div class="image-col left-image">
        <img class="product-image" src="{{product_image_primary}}" alt="" />
      </div>

      <div class="image-col right-image">
        <img class="product-image" src="{{product_image_secondary_1}}" alt="" />
      </div>
    </div>

    <div class="bottom-bar">
      <div class="discount-area">
        <span class="percent">%</span>
        <span class="number">30</span>

        <div class="discount-copy">
          <div class="basket-text">SEPETTE NET</div>
          <div class="discount-word">İNDİRİM</div>
        </div>
      </div>

      <div class="legal-note">
        *Çanta ve aksesuar kategorisi hariç tüm ürünlerde geçerlidir.
      </div>
    </div>

  </div>
</body>
</html>
