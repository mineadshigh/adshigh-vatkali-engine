<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">

    <div class="top-title">SEZON SONU FIRSATLARI</div>

    <div class="promo">
      <div class="up-to">UP TO 60%</div>

      <div class="seas">SEAS</div>
      <div class="white-pill"></div>
      <div class="black-dot"></div>
      <div class="n-letter">N</div>

      <div class="weekend">HAFTA SONUNA ÖZEL</div>
      <div class="extra">SEPETTE EKSTRA</div>
      <div class="ten">10</div>
      <div class="percent-small">%</div>
      <div class="off">FF</div>

      <div class="campaign-note">Kampanya 27.04.2026 10:00’a kadar tüm ürünlerde geçerlidir.</div>
    </div>

    <div class="main-image-wrap">
      <img class="main-image" src="{{product_image_primary}}" alt="" />
    </div>

    <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

    <div class="line-vertical"></div>
    <div class="line-horizontal"></div>

  </div>
</body>
</html>
