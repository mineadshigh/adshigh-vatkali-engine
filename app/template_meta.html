<div class="frame">

  <!-- SOL GÖRSEL -->
  <div class="left-image-wrap">
    <img class="left-image" src="{{product_image_primary}}" />
  </div>

  <!-- SAĞ ÜST OFFER -->
  <div class="offer">
    <div class="percent">%70</div>
    <div class="evaran">’e varan</div>

    <div class="offer-right">
      <div class="line1">İNDİRİMLERE EK</div>
      <div class="badge">SEPETTE %10 İNDİRİM</div>
      <div class="note">*seçili ürünlerde geçerlidir.</div>
    </div>
  </div>

  <!-- SAĞ GÖRSEL -->
  <div class="right-image-wrap">
    <img class="right-image" src="{{product_image_secondary_1}}" />
  </div>

  <!-- ÜRÜN -->
  <div class="product">
    <div class="title">{{title}}</div>

    <div class="prices">
      <span class="old">{{price}}</span>
      <span class="new">{{sale_price}}</span>
    </div>
  </div>

  <!-- LOGO -->
  <img class="logo" src="{{logo_url}}" />

</div>
