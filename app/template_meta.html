<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>{{CSS}}</style>
</head>

<body>
  <div class="frame">

    <div class="left-panel">

      <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

      <div class="offer-area">
        <div class="condition-text">2 ve üzeri ürüne</div>

        <div class="discount-main">
          <span class="discount-number">20</span>
          <span class="discount-percent">%</span>
        </div>

        <div class="discount-word">İNDİRİM</div>

        <div class="divider-line"></div>

        <div class="extra-offer">
          <strong>5.000 TL</strong> VE ÜZERİNE<br>
          EKSTRA <strong>500 TL İNDİRİM</strong>
        </div>
      </div>

    </div>

    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" alt="" />
    </div>

  </div>
</body>
</html>
