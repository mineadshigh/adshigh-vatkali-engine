<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1080, initial-scale=1.0" />
  <style>
    {{CSS}}
  </style>
</head>
<body>
  <div class="frame">

    <img class="logo" src="{{logo_url}}" alt="Vatkalı" />

    <div class="left-content">
      <div class="badge">ANNELER GÜNÜ SEÇKİSİ</div>

      <div class="discount-text">
        <div>Sepette ekstra</div>
        <strong>%10 indirim</strong>
      </div>

      <div class="product-info">
        <div class="product-title">{{title}}</div>

        <div class="price-row">
          <span class="old {{old_hidden}}">{{price}}</span>
          <span class="new {{new_hidden}}">{{sale_price}}</span>
          <span class="single {{single_hidden}}">{{price}}</span>
        </div>
      </div>

      <div class="campaign-note">
        Kampanya 11.05.2026 10:00’a kadar geçerlidir.
      </div>
    </div>

    <div class="image-wrap">
      <img class="product-image" src="{{product_image_primary}}" alt="" />
    </div>

  </div>
</body>
</html>
