<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<style>
{{CSS}}
</style>
</head>
<body>

<div class="frame">

  <!-- SOL -->
  <div class="left">

    <div class="logo">
      <img src="{{logo_url}}" />
    </div>

    <div class="campaign">
      <div class="badge">ANNELER GÜNÜ SEÇKİSİ</div>
      <div class="sub">Sepette ekstra</div>
      <div class="discount">%10 indirim</div>
    </div>

    <div class="product">
      <div class="title">{{title}}</div>

      <div class="prices">
        <span class="old {{old_hidden}}">{{price}}</span>
        <span class="new {{new_hidden}}">{{sale_price}}</span>
        <span class="single {{single_hidden}}">{{price}}</span>
      </div>
    </div>

    <div class="footer">
      Kampanya 11.03.2026 10:00’a kadar geçerlidir.
    </div>

  </div>

  <!-- SAĞ -->
  <div class="right">
    <img src="{{product_image_primary}}" />
  </div>

</div>

</body>
</html>
